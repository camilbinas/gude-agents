# Automated release workflow for the gude-agents multi-module Go repository.
#
# Trigger: push to master with conventional commit messages.
# Behavior:
#   1. Cleans up any stale bump commit/tags from previous failed runs.
#   2. Parses commits since the last root tag to determine the version bump.
#   3. Verifies the code builds and tests pass (using go.work).
#   4. Updates every submodule's go.mod to require the new root version.
#   5. Commits the go.mod changes, creates all tags, and pushes atomically.
#   6. Creates a GitHub Release with auto-generated notes.
#
# Conventional commit prefixes:
#   feat:  → minor bump   (0.3.0 → 0.4.0)
#   fix:   → patch bump   (0.3.0 → 0.3.1)
#   feat!: or BREAKING CHANGE → major bump (0.3.0 → 1.0.0)

name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Clean up any stale bump commit pushed by a previous failed run.
      # A stale bump commit has the message "chore: bump module versions to vX.Y.Z"
      # but no corresponding tag yet. We revert it so the version calculation
      # starts from a clean state.
      - name: Clean up stale bump commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          LAST_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$LAST_MSG" | grep -qE '^chore: bump module versions to v'; then
            BUMP_VERSION=$(echo "$LAST_MSG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
            # Check if the tag for this version exists — if not, it's a stale bump.
            if ! git tag --list "$BUMP_VERSION" | grep -q "$BUMP_VERSION"; then
              echo "Reverting stale bump commit for $BUMP_VERSION"
              git revert --no-edit HEAD
              git push origin master
            fi
          fi

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          BUMP="none"
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" -- . 2>/dev/null || git log --pretty=format:"%s" -- .)

          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE'; then
              BUMP="major"; break
            fi
            if echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            fi
            if echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No conventional commits — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP — $LATEST_TAG → $NEW_VERSION"

      # Build and test BEFORE touching go.mod or creating any tags.
      # Uses go.work so local modules resolve without published tags.
      - name: Verify build and tests
        if: steps.bump.outputs.skip == 'false'
        run: |
          GOWORK=$(pwd)/go.work go build ./agent/...
          GOWORK=$(pwd)/go.work go vet ./agent/...
          GOWORK=$(pwd)/go.work go test ./agent/... ./agent/graph/... ./agent/logging/slog/...

      # Everything below only runs if build+tests pass.
      # go.mod bump, tags, and push are done atomically so a failure
      # in any step doesn't leave the repo in a half-released state.

      - name: Update submodule go.mod files
        if: steps.bump.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          ROOT_MODULE="github.com/camilbinas/gude-agents"
          SUBMODULES=$(grep -E '^\s+\./' go.work | sed 's/^[[:space:]]*//' | sed 's|^./||' | grep -v -E '^(examples|integration)$')

          for sub in $SUBMODULES; do
            GOMOD="$sub/go.mod"
            if [ -f "$GOMOD" ]; then
              sed -i "s|${ROOT_MODULE} v[0-9]*\.[0-9]*\.[0-9]*|${ROOT_MODULE} ${NEW_VERSION}|g" "$GOMOD"
              echo "  Updated $GOMOD"
            fi
          done

          if [ -f "examples/go.mod" ]; then
            sed -i "s|${ROOT_MODULE} v[0-9]*\.[0-9]*\.[0-9]*|${ROOT_MODULE} ${NEW_VERSION}|g" examples/go.mod
            for sub in $SUBMODULES; do
              SUB_MODULE="${ROOT_MODULE}/${sub}"
              sed -i "s|${SUB_MODULE} v[0-9]*\.[0-9]*\.[0-9]*|${SUB_MODULE} ${NEW_VERSION}|g" examples/go.mod
            done
          fi

      - name: Commit, tag, and push atomically
        if: steps.bump.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A .
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump module versions to ${NEW_VERSION}"
          fi

          # Delete stale local tags from previous failed runs.
          git tag -d "$NEW_VERSION" 2>/dev/null || true

          # Root tag.
          git tag "$NEW_VERSION"

          # Submodule tags.
          SUBMODULES=$(grep -E '^\s+\./' go.work | sed 's/^[[:space:]]*//' | sed 's|^./||' | grep -v -E '^(examples|integration)$')
          for sub in $SUBMODULES; do
            git tag -d "${sub}/${NEW_VERSION}" 2>/dev/null || true
            git tag "${sub}/${NEW_VERSION}"
          done

          # Push commit and all tags together.
          git push origin master
          git push origin --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          LATEST_TAG: ${{ steps.bump.outputs.latest_tag }}
        run: |
          gh release create "$NEW_VERSION" \
            --title "$NEW_VERSION" \
            --generate-notes \
            --notes-start-tag "$LATEST_TAG"

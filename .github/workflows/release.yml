# Automated release workflow for the gude-agents multi-module Go repository.
#
# Trigger: push to master with conventional commit messages.
# Behavior:
#   1. Parses commits since the last root tag to determine the version bump.
#   2. Verifies the code builds (using go.work for local module resolution).
#   3. Updates every submodule's go.mod to require the new root version.
#   4. Commits the go.mod changes.
#   5. Creates tags for the root module and every submodule listed in go.work.
#   6. Pushes tags and the go.mod update commit.
#   7. Creates a GitHub Release with auto-generated notes.
#
# Conventional commit prefixes:
#   feat:  → minor bump   (0.2.1 → 0.3.0)
#   fix:   → patch bump   (0.2.1 → 0.2.2)
#   feat!: or BREAKING CHANGE → major bump (0.2.1 → 1.0.0)
#
# To skip a release, ensure no feat/fix commits are in the push.

name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine version bump
        id: bump
        run: |
          # Find the latest root tag.
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags found, starting at v0.1.0"
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Parse version components.
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Scan commits since last tag for conventional commit prefixes.
          BUMP="none"
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" -- . 2>/dev/null || git log --pretty=format:"%s" -- .)

          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE'; then
              BUMP="major"
              break
            fi
            if echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            fi
            if echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
              if [ "$BUMP" = "none" ]; then
                BUMP="patch"
              fi
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No conventional commits found — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP — $LATEST_TAG → $NEW_VERSION"

      # Build and test using go.work so local modules resolve against the
      # working tree — no published tags needed at this point.
      - name: Verify build and tests
        if: steps.bump.outputs.skip == 'false'
        run: |
          GOWORK=$(pwd)/go.work go build ./agent/...
          GOWORK=$(pwd)/go.work go vet ./agent/...
          GOWORK=$(pwd)/go.work go test ./agent/... ./agent/graph/... ./agent/logging/slog/...

      - name: Update submodule go.mod files
        if: steps.bump.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          ROOT_MODULE="github.com/camilbinas/gude-agents"

          # Parse submodule paths from go.work (skip ".", "examples", "integration").
          SUBMODULES=$(grep -E '^\s+\./' go.work | sed 's/^[[:space:]]*//' | sed 's|^./||' | grep -v -E '^(examples|integration)$')

          echo "Updating submodule go.mod files to require $ROOT_MODULE $NEW_VERSION"

          for sub in $SUBMODULES; do
            GOMOD="$sub/go.mod"
            if [ -f "$GOMOD" ]; then
              sed -i "s|${ROOT_MODULE} v[0-9]*\.[0-9]*\.[0-9]*|${ROOT_MODULE} ${NEW_VERSION}|g" "$GOMOD"
              echo "  Updated $GOMOD"
            fi
          done

          # Also update examples/go.mod.
          if [ -f "examples/go.mod" ]; then
            sed -i "s|${ROOT_MODULE} v[0-9]*\.[0-9]*\.[0-9]*|${ROOT_MODULE} ${NEW_VERSION}|g" examples/go.mod
            for sub in $SUBMODULES; do
              SUB_MODULE="${ROOT_MODULE}/${sub}"
              sed -i "s|${SUB_MODULE} v[0-9]*\.[0-9]*\.[0-9]*|${SUB_MODULE} ${NEW_VERSION}|g" examples/go.mod
            done
            echo "  Updated examples/go.mod"
          fi

      - name: Commit go.mod updates
        if: steps.bump.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A .

          if git diff --cached --quiet; then
            echo "No go.mod changes to commit."
          else
            git commit -m "chore: bump module versions to ${NEW_VERSION}"
          fi

      - name: Create tags
        if: steps.bump.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git tag "$NEW_VERSION"
          echo "Tagged: $NEW_VERSION"

          SUBMODULES=$(grep -E '^\s+\./' go.work | sed 's/^[[:space:]]*//' | sed 's|^./||' | grep -v -E '^(examples|integration)$')

          for sub in $SUBMODULES; do
            TAG="${sub}/${NEW_VERSION}"
            git tag "$TAG"
            echo "Tagged: $TAG"
          done

      - name: Push tags and commit
        if: steps.bump.outputs.skip == 'false'
        run: |
          git push origin master --follow-tags

      - name: Create GitHub Release
        if: steps.bump.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          LATEST_TAG: ${{ steps.bump.outputs.latest_tag }}
        run: |
          gh release create "$NEW_VERSION" \
            --title "$NEW_VERSION" \
            --generate-notes \
            --notes-start-tag "$LATEST_TAG"
